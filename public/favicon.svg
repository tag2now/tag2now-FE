<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Chrome metallic gradient matching header h1 -->
    <linearGradient id="chrome" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8a8a9a"/>
      <stop offset="25%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#b0b0c0"/>
      <stop offset="75%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#8a8a9a"/>
    </linearGradient>
    <!-- Red glow for energy effect -->
    <radialGradient id="redGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c8302e" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#c8302e" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#c8302e" stop-opacity="0"/>
    </radialGradient>
    <!-- Primary cyan for the "2" -->
    <linearGradient id="cyan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e8f0"/>
      <stop offset="100%" stop-color="#009ba3"/>
    </linearGradient>
    <!-- Filter for red outer glow matching header drop-shadow -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.8"/>
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#c8302e" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="64" height="64" rx="10" fill="#07070f"/>

  <!-- Red energy glow behind text -->
  <ellipse cx="32" cy="32" rx="26" ry="24" fill="url(#redGlow)"/>

  <!-- "T" in chrome metallic -->
  <text x="22" y="45" text-anchor="middle"
        font-family="'Orbitron','Arial Black',sans-serif" font-weight="900" font-size="34"
        fill="url(#chrome)" filter="url(#glow)">T</text>

  <!-- "2" in primary cyan (matching header-accent) -->
  <text x="46" y="45" text-anchor="middle"
        font-family="'Orbitron','Arial Black',sans-serif" font-weight="900" font-size="34"
        fill="url(#cyan)" filter="url(#glow)">2</text>

  <!-- Accent line at bottom (matching header ::after) -->
  <rect x="8" y="56" width="20" height="2" rx="1" fill="#c8302e" opacity="0.8"/>
</svg>
